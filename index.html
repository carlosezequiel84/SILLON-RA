<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Ver en tu espacio - AR</title>

  <!-- model-viewer: componente de Google con AR y detección de superficie (plane detection) integrada -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, Helvetica, Arial, sans-serif;
      background: #111;
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #f2f2f2;
      --poster-color: transparent;
    }
    /* Botón de AR personalizado */
    #ar-button {
      background-color: #111;
      color: white;
      border-radius: 30px;
      border: none;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      cursor: pointer;
    }
    #instrucciones {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      text-align: center;
      max-width: 85%;
    }
  </style>
</head>
<body>

  <model-viewer
    src="assets/modelo.glb"
    alt="Producto en 3D"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    ar-scale="auto"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
  >
    <button id="ar-button" slot="ar-button">
      Ver en mi espacio
    </button>
    <div id="instrucciones" slot="progress-bar">
      Cargando el producto...
    </div>
  </model-viewer>

</body>
</html>
